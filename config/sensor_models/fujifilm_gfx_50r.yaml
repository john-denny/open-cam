# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/fujifilm_gfx_50r/QE_red.csv
    green_csv: spectra/QE/cameras/fujifilm_gfx_50r/QE_green.csv
    blue_csv: spectra/QE/cameras/fujifilm_gfx_50r/QE_blue.csv
  pixel_pitch_um: 5.3
  fill_factor: 0.65
noise:
  emva:
    overall_system_gain_K_e_per_DN: 4.8831
    sigma_d_e: 3.3
    black_level_DN: 1024
    prnu_std_fraction: 0.008
    dsnu_std_e: 0.4
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 14
    full_well_e: 75000
validation:
  mean_abs_dn_atol: 0.27
  ptc_mu_e_levels:
  - 0.0
  - 6000.0
  - 31500.0
  - 54800.0
  - 73500.0
  datasheet:
    overall_system_gain_K_e_per_DN: 4.8831
    temporal_dark_noise_sigma_d_e: 3.3
    full_well_e: 75000
    black_level_DN: 1024
    bit_depth: 14
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 1.1 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  emva_gain_note: K corrected from web-scraped 1.1 e/DN to base-ISO 4.883 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: fujifilm_gfx_50r
  display_name: Fujifilm GFX 50R
