# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/nikon_d7100/QE_red.csv
    green_csv: spectra/QE/cameras/nikon_d7100/QE_green.csv
    blue_csv: spectra/QE/cameras/nikon_d7100/QE_blue.csv
  pixel_pitch_um: 3.9
  fill_factor: 0.58
noise:
  emva:
    overall_system_gain_K_e_per_DN: 1.9008
    black_level_DN: 600
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 14
    full_well_e: 30000
validation:
  mean_abs_dn_atol: 0.55
  ptc_mu_e_levels:
  - 0.0
  - 2400.0
  - 12600.0
  - 21900.0
  - 29400.0
  datasheet:
    overall_system_gain_K_e_per_DN: 1.9008
    full_well_e: 30000
    black_level_DN: 600
    bit_depth: 14
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 0.65 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  sensor_class: apsc
  emva_gain_note: K corrected from web-scraped 0.65 e/DN to base-ISO 1.901 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: nikon_d7100
  display_name: Nikon D7100
