# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/panasonic_gx8/QE_red.csv
    green_csv: spectra/QE/cameras/panasonic_gx8/QE_green.csv
    blue_csv: spectra/QE/cameras/panasonic_gx8/QE_blue.csv
  pixel_pitch_um: 3.3
  fill_factor: 0.59
noise:
  emva:
    overall_system_gain_K_e_per_DN: 4.6887
    sigma_d_e: 2.4
    black_level_DN: 256
    prnu_std_fraction: 0.011
    dsnu_std_e: 0.27
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 12
    full_well_e: 18000
validation:
  mean_abs_dn_atol: 0.2
  ptc_mu_e_levels:
  - 0.0
  - 1400.0
  - 7600.0
  - 13100.0
  - 17600.0
  datasheet:
    overall_system_gain_K_e_per_DN: 4.6887
    temporal_dark_noise_sigma_d_e: 2.4
    full_well_e: 18000
    black_level_DN: 256
    bit_depth: 12
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 0.45 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  sensor_class: mft
  emva_gain_note: K corrected from web-scraped 0.45 e/DN to base-ISO 4.689 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: panasonic_gx8
  display_name: Panasonic GX8
