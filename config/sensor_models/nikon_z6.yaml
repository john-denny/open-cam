# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/nikon_z6/QE_red.csv
    green_csv: spectra/QE/cameras/nikon_z6/QE_green.csv
    blue_csv: spectra/QE/cameras/nikon_z6/QE_blue.csv
  pixel_pitch_um: 5.94
  fill_factor: 0.65
noise:
  emva:
    overall_system_gain_K_e_per_DN: 4.0955
    sigma_d_e: 2.3
    black_level_DN: 512
    prnu_std_fraction: 0.007
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 14
    full_well_e: 65000
validation:
  mean_abs_dn_atol: 0.22
  ptc_mu_e_levels:
  - 0.0
  - 5200.0
  - 27300.0
  - 47400.0
  - 63700.0
  datasheet:
    overall_system_gain_K_e_per_DN: 4.0955
    temporal_dark_noise_sigma_d_e: 2.3
    full_well_e: 65000
    black_level_DN: 512
    bit_depth: 14
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 1.1 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  emva_gain_note: K corrected from web-scraped 1.1 e/DN to base-ISO 4.096 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: nikon_z6
  display_name: Nikon Z6
