# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/leica_cl/QE_red.csv
    green_csv: spectra/QE/cameras/leica_cl/QE_green.csv
    blue_csv: spectra/QE/cameras/leica_cl/QE_blue.csv
  pixel_pitch_um: 3.9
  fill_factor: 0.58
noise:
  emva:
    overall_system_gain_K_e_per_DN: 2.5203
    sigma_d_e: 2.5
    black_level_DN: 512
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 14
    full_well_e: 40000
validation:
  mean_abs_dn_atol: 0.4
  ptc_mu_e_levels:
  - 0.0
  - 3200.0
  - 16800.0
  - 29200.0
  - 39200.0
  datasheet:
    overall_system_gain_K_e_per_DN: 2.5203
    temporal_dark_noise_sigma_d_e: 2.5
    full_well_e: 40000
    black_level_DN: 512
    bit_depth: 14
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 0.65 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  sensor_class: apsc
  emva_gain_note: K corrected from web-scraped 0.65 e/DN to base-ISO 2.52 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: leica_cl
  display_name: Leica CL
