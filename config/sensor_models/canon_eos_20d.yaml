# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/canon_eos_20d/QE_red.csv
    green_csv: spectra/QE/cameras/canon_eos_20d/QE_green.csv
    blue_csv: spectra/QE/cameras/canon_eos_20d/QE_blue.csv
  pixel_pitch_um: 6.4
  fill_factor: 0.45
noise:
  emva:
    overall_system_gain_K_e_per_DN: 14.6532
    sigma_d_e: 25.0
    black_level_DN: 1024
    prnu_std_fraction: 0.015
    dsnu_std_e: 1.2
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 12
    full_well_e: 45000
validation:
  mean_abs_dn_atol: 0.68
  ptc_mu_e_levels:
  - 0.0
  - 3600.0
  - 18900.0
  - 32800.0
  - 44100.0
  datasheet:
    overall_system_gain_K_e_per_DN: 14.6532
    temporal_dark_noise_sigma_d_e: 25.0
    full_well_e: 45000
    black_level_DN: 1024
    bit_depth: 12
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 1.8 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  emva_gain_note: K corrected from web-scraped 1.8 e/DN to base-ISO 14.65 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: canon_eos_20d
  display_name: Canon EOS 20D
