# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/huawei_mate_20_pro/QE_red.csv
    green_csv: spectra/QE/cameras/huawei_mate_20_pro/QE_green.csv
    blue_csv: spectra/QE/cameras/huawei_mate_20_pro/QE_blue.csv
  f_number: 1.8
  fill_factor: 0.76
noise:
  emva:
    overall_system_gain_K_e_per_DN: 2.6048
    sigma_d_e: 1.4
    black_level_DN: 64
    prnu_std_fraction: 0.018
    dsnu_std_e: 0.16
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 12
    full_well_e: 10500
validation:
  mean_abs_dn_atol: 0.21
  ptc_mu_e_levels:
  - 0.0
  - 800.0
  - 4400.0
  - 7700.0
  - 10300.0
  datasheet:
    overall_system_gain_K_e_per_DN: 2.6048
    temporal_dark_noise_sigma_d_e: 1.4
    full_well_e: 10500
    black_level_DN: 64
    bit_depth: 12
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 0.22 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  sensor_class: phone
  emva_gain_note: K corrected from web-scraped 0.22 e/DN to base-ISO 2.605 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: huawei_mate_20_pro
  display_name: Huawei Mate 20 Pro
