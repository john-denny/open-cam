# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/leica_m_type_262/QE_red.csv
    green_csv: spectra/QE/cameras/leica_m_type_262/QE_green.csv
    blue_csv: spectra/QE/cameras/leica_m_type_262/QE_blue.csv
  pixel_pitch_um: 5.4
  fill_factor: 0.63
noise:
  emva:
    overall_system_gain_K_e_per_DN: 3.7805
    sigma_d_e: 3.0
    black_level_DN: 512
    prnu_std_fraction: 0.008
    dsnu_std_e: 0.25
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 14
    full_well_e: 60000
validation:
  mean_abs_dn_atol: 0.32
  ptc_mu_e_levels:
  - 0.0
  - 4800.0
  - 25200.0
  - 43800.0
  - 58800.0
  datasheet:
    overall_system_gain_K_e_per_DN: 3.7805
    temporal_dark_noise_sigma_d_e: 3.0
    full_well_e: 60000
    black_level_DN: 512
    bit_depth: 14
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 0.85 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  sensor_class: fullframe
  emva_gain_note: K corrected from web-scraped 0.85 e/DN to base-ISO 3.78 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: leica_m_type_262
  display_name: Leica M Type 262
