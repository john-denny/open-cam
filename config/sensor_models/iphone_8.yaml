# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/iphone_8/QE_red.csv
    green_csv: spectra/QE/cameras/iphone_8/QE_green.csv
    blue_csv: spectra/QE/cameras/iphone_8/QE_blue.csv
  f_number: 1.8
  fill_factor: 0.76
noise:
  emva:
    overall_system_gain_K_e_per_DN: 9.9062  # base ISO gain (full_well / usable_DN)
    # ISO amplifier gain for simulation.  base-ISO (1.0) is too dark at 200 lux / 0.01 s.
    # 45× ≈ ISO 900 (assuming base ISO ~20), which is a typical indoor operating point.
    # Change to 1.0 to simulate maximum dynamic range (base ISO).
    iso_gain_factor: 45.0
    sigma_d_e: 1.6
    black_level_DN: 64
    prnu_std_fraction: 0.018
    dsnu_std_e: 0.16
    dark_current_e_per_s: 0.25
  adc:
    full_well_e: 9500
cfa:
  spatial_crosstalk:
    enabled: true
validation:
  mean_abs_dn_atol: 0.06
  ptc_mu_e_levels:
  - 0.0
  - 800.0
  - 4000.0
  - 6900.0
  - 9300.0
  datasheet:
    overall_system_gain_K_e_per_DN: 9.9062
    temporal_dark_noise_sigma_d_e: 1.6
    full_well_e: 9500
    black_level_DN: 64
    bit_depth: 10
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 0.22 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  sensor_class: phone
  emva_gain_note: K corrected from web-scraped 0.22 e/DN to base-ISO 9.906 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: iphone_8
  display_name: iPhone 8
