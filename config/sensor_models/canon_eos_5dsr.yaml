# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/canon_eos_5dsr/QE_red.csv
    green_csv: spectra/QE/cameras/canon_eos_5dsr/QE_green.csv
    blue_csv: spectra/QE/cameras/canon_eos_5dsr/QE_blue.csv
  pixel_pitch_um: 4.14
  fill_factor: 0.5
noise:
  emva:
    overall_system_gain_K_e_per_DN: 4.3948
    sigma_d_e: 3.5
    black_level_DN: 2048
    prnu_std_fraction: 0.012
    dsnu_std_e: 0.8
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 14
    full_well_e: 63000
validation:
  mean_abs_dn_atol: 0.32
  ptc_mu_e_levels:
  - 0.0
  - 5000.0
  - 26500.0
  - 46000.0
  - 61700.0
  datasheet:
    overall_system_gain_K_e_per_DN: 4.3948
    temporal_dark_noise_sigma_d_e: 3.5
    full_well_e: 63000
    black_level_DN: 2048
    bit_depth: 14
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 0.9 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  emva_gain_note: K corrected from web-scraped 0.9 e/DN to base-ISO 4.395 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: canon_eos_5dsr
  display_name: Canon EOS 5DsR
