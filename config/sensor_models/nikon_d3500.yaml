# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/nikon_d3500/QE_red.csv
    green_csv: spectra/QE/cameras/nikon_d3500/QE_green.csv
    blue_csv: spectra/QE/cameras/nikon_d3500/QE_blue.csv
  pixel_pitch_um: 3.9
  fill_factor: 0.58
noise:
  emva:
    overall_system_gain_K_e_per_DN: 1.5206
    sigma_d_e: 2.5
    black_level_DN: 600
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 14
    full_well_e: 24000
validation:
  mean_abs_dn_atol: 0.66
  ptc_mu_e_levels:
  - 0.0
  - 1900.0
  - 10100.0
  - 17500.0
  - 23500.0
  datasheet:
    overall_system_gain_K_e_per_DN: 1.5206
    temporal_dark_noise_sigma_d_e: 2.5
    full_well_e: 24000
    black_level_DN: 600
    bit_depth: 14
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 0.6 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  sensor_class: apsc
  emva_gain_note: K corrected from web-scraped 0.6 e/DN to base-ISO 1.521 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: nikon_d3500
  display_name: Nikon D3500
