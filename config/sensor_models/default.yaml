schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/interpolated/QE_red.csv
    green_csv: spectra/QE/interpolated/QE_green.csv
    blue_csv: spectra/QE/interpolated/QE_blue.csv
    ircf_csv: spectra/QE/interpolated/QE_IRCF.csv
  pixel_pitch_um: 1.4
  integration_time_s: 0.01
  f_number: 2.0
  fill_factor: 0.95
noise:
  emva:
    overall_system_gain_K_e_per_DN: 4.77
    sigma_d_e: 2.6
    black_level_DN: 16
    use_poisson_shot_noise: true
    prnu_std_fraction: 0.01
    dsnu_std_e: 0.3
    # ISO amplifier gain relative to base ISO.
    # At base ISO (iso_gain_factor: 1.0) K_eff = K_base and full_well_eff = full_well_base.
    # At higher ISO (iso_gain_factor > 1.0):
    #   K_eff       = K_base       / iso_gain_factor  (fewer e per DN → brighter image)
    #   full_well_eff = full_well_e / iso_gain_factor  (earlier ADC clip in electron space)
    # All electron-domain quantities (sigma_d_e, prnu, dsnu, dark_current) are physical
    # silicon properties and are NOT scaled — only the amplifier gain changes.
    # Example: iso_gain_factor: 45 ≈ ISO 900 if base ISO is 20.
    iso_gain_factor: 1.0
    # Seed for the fixed spatial-pattern RNG (PRNU and DSNU maps).
    # These patterns are the same every frame from the same camera unit.
    # null = derive automatically from the config file path (different cameras
    #        get different patterns; changing the path changes the pattern).
    # integer = explicit override (useful for reproducible unit tests).
    spatial_noise_seed: null
    dark_current_e_per_s: 0.15
    dark_current_reference_temp_c: 20.0
    temperature_c: 20.0
    dark_current_doubling_per_c: 6.0
    row_fpn_std_e: 0.0
    column_fpn_std_e: 0.0
  adc:
    bit_depth: 10
    full_well_e: 4800
    clipping: hard
    inl_quadratic_fraction: 0.0
    dnl_std_lsb: 0.0
  processing:
    auto_exposure: false
    exposure_scale_e_per_unit: 1.0
    linear_exr_mode: integrate_qe
cfa:
  enabled: true
  pattern: GBRG
  demosaic: bilinear
  demosaic_srgb: true
  spatial_crosstalk:
    # Spatial inter-pixel diffusion: convolve the CFA RAW with a normalised Gaussian
    # of width sigma_pixels before the noise chain.  Models photon diffusion in the
    # epitaxial layer that causes R/G/B well-to-well leakage (distinct from the global
    # sensor.crosstalk 3x3 matrix which applies a uniform per-channel mix pre-CFA).
    # Typical sigma values:
    #   0.20 px  ~0.3 % leakage per nearest-neighbour  (low-crosstalk BSI)
    #   0.30 px  ~1.5 % leakage per nearest-neighbour  (typical BSI CMOS, e.g. Sony IMX)
    #   0.50 px  ~8 %  leakage per nearest-neighbour   (older FSI / large-pitch sensors)
    enabled: false
    sigma_pixels: 0.30
sensor_forward:
  model:
    electrons_scale: 25000.0
    include_surround: true
    surround_reflectance: 0.22
    calibration:
      mode: photon_counting
      irradiance_scale_W_m2nm_per_unit: 0.001
      illuminant_override_csv: spectra/illuminant/interpolated/D55.csv
      target_illuminance_lux: 500.0
      optics_transmittance: 1.0
      use_aperture_factor: true
    cosine_shading: true
    chart_normal:
    - 0.0
    - 0.0
    - 1.0
    vignetting_cos4: false
    pbrt_spectral_exr:
      radiance_to_irradiance: thin_lens
      radiance_to_irradiance_scale: null
      extra_irradiance_scale: 1.0
      radiometric_autocalibration: mean_photopic_lux
validation:
  monte_carlo_trials: 20000
  random_seed: 0
  variance_rtol: 0.07
  mean_abs_dn_atol: 0.22
  ptc_mu_e_levels:
  - 0.0
  - 400.0
  - 2000.0
  - 3500.0
  - 4700.0
  datasheet:
    enabled: true
    overall_system_gain_K_e_per_DN: 4.77
    temporal_dark_noise_sigma_d_e: 2.6
    full_well_e: 4800
    black_level_DN: 16
    parameter_rtol: 0.02
lens:
  post_psf:
    # Set enabled: true to apply a post-render Gaussian PSF to the spectral EXR.
    # Two modes are available:
    #
    #   gaussian          – a single sigma_pixels applied to every channel (legacy).
    #   chromatic_gaussian – wavelength-dependent blur per spectral bucket:
    #                          σ_diff(λ) = 0.42 × N × λ_nm / (1000 × pixel_pitch_µm)
    #                          σ(λ)      = sqrt( σ_diff(λ)² + σ_geom² )
    #                        where N = f_number and σ_geom = sigma_geometric_pixels.
    #                        f_number and pixel_pitch_um are read from sensor.f_number /
    #                        sensor.pixel_pitch_um unless overridden here.
    enabled: false
    mode: chromatic_gaussian
    sigma_pixels: 0.0                # used by 'gaussian' mode only
    sigma_geometric_pixels: 0.5      # baseline geometric-aberration σ for 'chromatic_gaussian'
    # f_number: null                 # override sensor.f_number (null = use sensor value)
    # pixel_pitch_um: null           # override sensor.pixel_pitch_um (null = use sensor value)
    stray_light:
      enabled: false
      veiling_glare_fraction: 0.01
      halo_sigma_pixels: 15.0
      halo_strength: 0.01
model:
  name: default
