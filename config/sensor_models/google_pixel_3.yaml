# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/google_pixel_3/QE_red.csv
    green_csv: spectra/QE/cameras/google_pixel_3/QE_green.csv
    blue_csv: spectra/QE/cameras/google_pixel_3/QE_blue.csv
  f_number: 1.8
  fill_factor: 0.78
noise:
  emva:
    overall_system_gain_K_e_per_DN: 2.7289
    sigma_d_e: 1.3
    black_level_DN: 64
    prnu_std_fraction: 0.018
    dsnu_std_e: 0.25
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 12
    full_well_e: 11000
validation:
  mean_abs_dn_atol: 0.19
  ptc_mu_e_levels:
  - 0.0
  - 900.0
  - 4600.0
  - 8000.0
  - 10800.0
  datasheet:
    overall_system_gain_K_e_per_DN: 2.7289
    temporal_dark_noise_sigma_d_e: 1.3
    full_well_e: 11000
    black_level_DN: 64
    bit_depth: 12
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 0.25 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  emva_gain_note: K corrected from web-scraped 0.25 e/DN to base-ISO 2.729 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: google_pixel_3
  display_name: Google Pixel 3
