# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/canon_eos_80d/QE_red.csv
    green_csv: spectra/QE/cameras/canon_eos_80d/QE_green.csv
    blue_csv: spectra/QE/cameras/canon_eos_80d/QE_blue.csv
  pixel_pitch_um: 3.75
  fill_factor: 0.55
noise:
  emva:
    overall_system_gain_K_e_per_DN: 1.744
    sigma_d_e: 2.2
    black_level_DN: 2048
    dsnu_std_e: 0.6
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 14
    full_well_e: 25000
validation:
  mean_abs_dn_atol: 0.5
  ptc_mu_e_levels:
  - 0.0
  - 2000.0
  - 10500.0
  - 18200.0
  - 24500.0
  datasheet:
    overall_system_gain_K_e_per_DN: 1.744
    temporal_dark_noise_sigma_d_e: 2.2
    full_well_e: 25000
    black_level_DN: 2048
    bit_depth: 14
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 0.5 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  emva_gain_note: K corrected from web-scraped 0.5 e/DN to base-ISO 1.744 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: canon_eos_80d
  display_name: Canon EOS 80D
