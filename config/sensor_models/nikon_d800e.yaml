# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/nikon_d800e/QE_red.csv
    green_csv: spectra/QE/cameras/nikon_d800e/QE_green.csv
    blue_csv: spectra/QE/cameras/nikon_d800e/QE_blue.csv
  pixel_pitch_um: 4.88
  fill_factor: 0.6
noise:
  emva:
    overall_system_gain_K_e_per_DN: 2.8512
    sigma_d_e: 2.7
    black_level_DN: 600
    prnu_std_fraction: 0.008
    dsnu_std_e: 0.4
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 14
    full_well_e: 45000
validation:
  mean_abs_dn_atol: 0.38
  ptc_mu_e_levels:
  - 0.0
  - 3600.0
  - 18900.0
  - 32800.0
  - 44100.0
  datasheet:
    overall_system_gain_K_e_per_DN: 2.8512
    temporal_dark_noise_sigma_d_e: 2.7
    full_well_e: 45000
    black_level_DN: 600
    bit_depth: 14
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 0.7 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  emva_gain_note: K corrected from web-scraped 0.7 e/DN to base-ISO 2.851 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: nikon_d800e
  display_name: Nikon D800E
