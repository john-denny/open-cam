# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/konica_minolta_dynax7d/QE_red.csv
    green_csv: spectra/QE/cameras/konica_minolta_dynax7d/QE_green.csv
    blue_csv: spectra/QE/cameras/konica_minolta_dynax7d/QE_blue.csv
  pixel_pitch_um: 6.0
  fill_factor: 0.45
noise:
  emva:
    overall_system_gain_K_e_per_DN: 13.9548
    sigma_d_e: 20.0
    black_level_DN: 512
    prnu_std_fraction: 0.015
    dsnu_std_e: 0.7
    dark_current_e_per_s: 0.5
  adc:
    bit_depth: 12
    full_well_e: 50000
validation:
  mean_abs_dn_atol: 0.57
  ptc_mu_e_levels:
  - 0.0
  - 4000.0
  - 21000.0
  - 36500.0
  - 49000.0
  datasheet:
    overall_system_gain_K_e_per_DN: 13.9548
    temporal_dark_noise_sigma_d_e: 20.0
    full_well_e: 50000
    black_level_DN: 512
    bit_depth: 12
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 1.5 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  sensor_class: old
  emva_gain_note: K corrected from web-scraped 1.5 e/DN to base-ISO 13.95 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: konica_minolta_dynax7d
  display_name: Konica_Minolta Dynax7D
