# Delta from config/sensor_models/default.yaml — only overrides are listed.
schema_version: 1
sensor:
  quantum_efficiency:
    red_csv: spectra/QE/cameras/iphone_x_wide/QE_red.csv
    green_csv: spectra/QE/cameras/iphone_x_wide/QE_green.csv
    blue_csv: spectra/QE/cameras/iphone_x_wide/QE_blue.csv
  pixel_pitch_um: 1.22
  f_number: 1.8
  fill_factor: 0.75
noise:
  emva:
    overall_system_gain_K_e_per_DN: 10.4275
    sigma_d_e: 1.5
    black_level_DN: 64
    prnu_std_fraction: 0.02
    dark_current_e_per_s: 0.5
  adc:
    full_well_e: 10000
validation:
  mean_abs_dn_atol: 0.06
  ptc_mu_e_levels:
  - 0.0
  - 800.0
  - 4200.0
  - 7300.0
  - 9800.0
  datasheet:
    overall_system_gain_K_e_per_DN: 10.4275
    temporal_dark_noise_sigma_d_e: 1.5
    full_well_e: 10000
    black_level_DN: 64
    bit_depth: 10
    gain_convention: e_per_dn
    source: K corrected to base-ISO gain (full_well_e / usable_DN) for ADC consistency.
      Original web-scraped K was 0.2 e/DN (measured at amplified ISO). Other parameters
      unchanged from scraped internet table (2026-04-24).
source:
  qe_workbook: spectra/QE/Spectral_sensitivities_IE.xlsx
  sheet: Data
  emva_param_method: inferred_web_table_v1
  emva_gain_note: K corrected from web-scraped 0.2 e/DN to base-ISO 10.43 e/DN (=
    full_well_e / usable_DN) for ADC self-consistency
  calibration_tier: inferred
model:
  name: iphone_x_wide
  display_name: iPhone X wide
