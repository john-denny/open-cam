schema_version: 1
paths:
  scene_builder: tools/build_colorchecker_scene.py
  pbrt: third_party/pbrt-v4/build/pbrt
  noise_tool: tools/apply_emva_noise.py
  sensor_forward_tool: tools/spectral_sensor_forward.py
  pbrt_exr_to_electrons_tool: tools/pbrt_spectral_exr_to_electrons.py
  validate_tool: tools/validate_colorchecker.py
  validate_demosaic_tool: tools/validate_demosaic_linear.py
  validate_emva_tool: tools/validate_emva_model.py
  emva_validation_report: out/emva_validation_report.json
  scene_file: scenes/generated/colorchecker.pbrt
  exr_out: out/colorchecker_spectral.exr
  camera_model_name: iphone_8
  sensor_forward_electrons_npz: out/sensor_forward_electrons.npz
  demosaic_metrics_json: out/demosaic_linear_metrics.json
  out_dir: out
  psf_tool: tools/apply_spectral_psf.py
render:
  light_scale: 1.0
  cam_dist: 4.0
  xres: 960
  yres: 640
  # Keep Monte Carlo render noise sub-dominant to sensor/noise stages.
  # For quick iteration, lower this (e.g. 64-256). For final runs, keep >=1024.
  pixelsamples: 64
  film: spectral
  film_output: null
  spectral_nbuckets: 32
  spectral_lambda_min: 360.0
  spectral_lambda_max: 830.0
  # Optional repo-relative CSV override for scene illuminant spectrum.
  # Example: spectra/illuminant/interpolated/D65.csv
  illuminant: spectra/illuminant/interpolated/D65.csv
  builder_extra_args: []
  # GPU render path (PBRT wavefront). Requires a GPU-enabled PBRT build.
  gpu_enabled: true
  # Extra PBRT render CLI args, e.g. ["--stats"] or ["--wavefront", "--stats"].
  # If gpu_enabled=true, --wavefront is injected automatically unless already present.
  pbrt_args: ["--stats"]
validate:
  enabled: true
validate_emva:
  enabled: true
# Optional run-level override for lens.camera from the selected camera model.
# Set to null to use camera-model default; options: pinhole, thinlens, realistic.
lens_type_override: realistic
# Optional run-level lens parameter overrides (null = use camera-model value).
lens_overrides:
  pinhole_fov_deg: null
  thinlens_fov_deg: null
  thinlens_lens_radius: null
  thinlens_focal_distance: null
  realistic_lensfile: null
  realistic_aperture_diameter_mm: null
  realistic_focus_distance: null
strict_physical_accuracy:
  strict_qe_validation: false
  strict_calibration_validation: false
  calibration_tier_policy: semi_strict
realistic_focus_distance_override: 4.0
exposure_time_override_s: 0.06
sensor_forward:
  mode: pbrt_exr
  enabled: true
  # Optional global lux override for forward-model calibration.
  # null means "use target_illuminance_lux from the selected camera model".
  target_illuminance_lux: 200
noise:
  enabled: true
  seed: 0
  exposure_scale: null
  preview_percentile: 99.5
  preview_no_normalize: true
  # Optional preview overrides; null = use processing defaults from sensor model.
  preview_white_balance_enabled: false
  preview_color_correction_enabled: false
validate_demosaic:
  enabled: true
  crop: 2
